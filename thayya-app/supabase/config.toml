# Minimal config so `supabase functions serve|deploy` can find the project.
# Run `supabase init` locally if you need full local stack defaults.

project_id = "thayya-app"

# Public read-only endpoint: no Supabase Auth JWT required.
# Secured by only returning workshop fields you select in code; DB access uses the service role (secret).
[functions.workshops-upcoming]
verify_jwt = false

# Public instructor cards for discover / home; service role reads a bounded profile list.
[functions.discover-instructors]
verify_jwt = false

# Public workshop list for discover; optional lat/lng filters by haversine in the function.
[functions.discover-workshops]
verify_jwt = false

# Requires a valid Supabase session JWT (Authorization: Bearer …).
[functions.register-user-profile]
verify_jwt = true

# Session JWT; multipart image body uploaded to R2, then profiles.avatar_url updated.
[functions.upload-profile-avatar]
verify_jwt = true

# Instructor/admin create/update workshop; validates JWT then writes with service role.
[functions.save-workshop]
verify_jwt = true

# JWT: workshops where instructor_id = auth.uid(), upcoming first (then undated, then past).
[functions.instructor-workshops]
verify_jwt = true
